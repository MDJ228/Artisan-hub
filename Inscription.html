<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTISAN-HUB_Inscription</title>
        <link rel="stylesheet" href="Inscription.css">
        <script src="https://unpkg.com/lucide@latest"></script>
        <!-- Les fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="form-box">
            <h2>Inscription</h2>
            <form action="Traitement.php" method="post" onsubmit="return verifierMotDePasse()">
            <!--label du nom-->
            <label for="Nom">Nom</label>
            <input type="text" name="Nom" placeholder="Dupont" required><br><br>
            <!--label du prénom-->
            <label for="Prenom">Prenom</label>
            <input type="text" name="Prenom" placeholder="Jean" required><br><br>
             <!--label de l'e-mail-->
            <label for="mail">E-mail</label>
            <input type="email" name="mail" placeholder="user@gmail.com" required><br><br>

            <!--Vérification et confirmation du mot de passe-->
           
            <label for="password"> Mot de passe</label>
            <div class="input-group">
            <input type="password" Id="password" placeholder="................" maxlength="16" required><br><br>
             <span class="toggle-password" onclick="togglePassword('password', this)">
                <i data-lucide="eye"></i>
                </span>
            </div>

            <label for="confirm">Confirmer le mot de passe</label>
            <div class="input-group">
            <input type="password" Id="confirm_password"  placeholder="................" maxlength="16" required><br><br>
                <span class="toggle-password" onclick="togglePassword('password', this)">
                    <i data-lucide="eye"></i>
                </span>
           </div>
            <!--Choix de métier-->
            Votre métier <select>
                <option value="Bâtiment & Construction">Bâtiment & Construction</option>
                <option value="Textile & habillement">Textile & habillement</option>
                <option value="Alimentation">Alimentation</option>
                <option value="Art & création">Art & création</option>
                <option value="Réparation & maintenance">Réparation & maintenance</option>
                <option value="Travail du bois, du métal & du cuir">Travail du bois, du métal & du cuir</option>
                <option value="Services artisanaux" selected>Services artisanaux</option>
            </select><br><br>
            <div class="form-footer"><!--Bouton d'envoie-->
          <button type="submit">Créer un compte</button><br><br>
           <p> Déjà un compte ? <a href="Connexion.html" target="_blank">Se connecter</a></p>
            </div>
         </div>
    </div>
    </form>
    <script src="Password.js"></script>
</body>
</html>
