<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion_ARTISAN-HUB</title>
    <link rel="stylesheet" href="Connexion.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    
    <div class="Container">
        <div class="box-form">
            <h2>Connexion</h2>
            <p class="subtitle">connectez-vous à votre compte Artisan</p>
            <form action="Traitement.php" method="post">
                 
                <!--Label du mail-->
                
                <input type="email" id="mail" placeholder="Adresse e-mail" required><br><br>

                <!--Label mot de passe-->
                <div class="label-row">
   
                <a href="#">Mot de passe oublié ?</a>
                </div>

                <div class="input-group">
                <input type="password" id="password" name="password" placeholder="Mot de passe">
                <span class="toggle-password" onclick="togglePassword('password', this)">
                    <i data-lucide="eye"></i>
                </span>
                </div>
                <div class="remember-me">
                <input type="checkbox" id="choix"> 
                <label for="choix">Se souvenir de moi</label><br><br>
                </div>
                 <button type="submit">Se connecter</button><br>
                 <p class="register-link">
                Pas encore de compte ?
                <a href="Inscription.html" target="_blank">Créer un compte</a> 
                </p>

               
            </form>
        </div>
    
    </div>
    <script src="Password.js"></script>
</body>
</html>
